<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Categories - 示例博客</title>
<link rel="stylesheet" href="/css/base.css"/>
<link rel="stylesheet" href="/css/mdui.min.css">
<link rel="stylesheet" href="/css/font-icon.css">
<link rel="alternate" type="application/rss+xml" href="https://example.org/categories/index.xml" title="示例博客">

</head>
<body class="mdui-drawer-body-left mdui-loaded">
    <div id="nexmoe-background">
    <canvas id="c_n1" class="nexmoe-bg"></canvas>
    <div class="mdui-appbar mdui-shadow-0">
        <div class="mdui-toolbar">
            <a href="#" mdui-drawer="{target: '#drawer', swipe: true}" title="menu" class="mdui-btn mdui-btn-icon">
                <i class="mdui-icon iconfont solo-list"></i>
            </a>
            <div class="mdui-toolbar-spacer"></div>
            <a href="/" title="示例博客" class="mdui-btn mdui-btn-icon">
                <img src="/images/avatar.png" title="示例博客" alt="示例博客">
            </a>
        </div>
    </div>
</div>
    <div id="nexmoe-header">
    <div class="nexmoe-drawer mdui-drawer" id="drawer">
        <div class="nexmoe-avatar mdui-ripple">
            <a href="/" title="示例博客">
                <img src="/images/avatar.png" title="示例博客" alt="示例博客">
            </a>
        </div>
        <div class="nexmoe-count">
            <div>
                <span>文章</span>
                
                
                4
            </div>
        </div>
        <div class="list-content">
    <ul class="nexmoe-list mdui-list header__nav" mdui-collapse="{accordion: true}">
        
        <a class="nexmoe-list-item mdui-list-item mdui-ripple" href="/" title="首页">
            <i class="mdui-list-item-icon iconfont solo-home"></i>
            <div class="mdui-list-item-content">首页</div>
        </a>
        
        <a class="nexmoe-list-item mdui-list-item mdui-ripple" href="/links/" title="友情链接">
            <i class="mdui-list-item-icon iconfont solo-about"></i>
            <div class="mdui-list-item-content">友情链接</div>
        </a>
        
        <a class="nexmoe-list-item mdui-list-item mdui-ripple" href="/archives/" title="时间线">
            <i class="mdui-list-item-icon iconfont solo-list"></i>
            <div class="mdui-list-item-content">时间线</div>
        </a>
        
    </ul>
</div>
        <aside id="nexmoe-sidebar">
    
    <div class="nexmoe-widget-wrap">
        <h3 class="nexmoe-widget-title">社交按钮</h3>
        <div class="nexmoe-widget nexmoe-social">
            
            <a href="https://github.com" target="_blank" title="GitHub">
                <i class="mdui-list-item-icon iconfont solo-github"></i>
            </a>
            
        </div>
    </div>
    
    
    
    <div class="nexmoe-widget-wrap">
        <h3 class="nexmoe-widget-title">标签</h3>
        <div class="nexmoe-widget tagcloud">
            
            
            <a href="https://example.org/tags/javascript/" class="mdui-ripple">javascript</a>
            
            
            <a href="https://example.org/tags/python/" class="mdui-ripple">python</a>
            
            
            <a href="https://example.org/tags/%E5%89%8D%E7%AB%AF/" class="mdui-ripple">前端</a>
            
            
            <a href="https://example.org/tags/%E6%95%B0%E6%8D%AE%E5%88%86%E6%9E%90/" class="mdui-ripple">数据分析</a>
            
            
            <a href="https://example.org/tags/%E7%94%9F%E6%B4%BB/" class="mdui-ripple">生活</a>
            
        </div>
    </div>
    
    
    
    <div class="nexmoe-widget-wrap">
        <h3 class="nexmoe-widget-title">分类</h3>
        <div class="nexmoe-widget">
            <ul class="category-list">
                
                
                <li class="category-list-item">
                    <a class="category-list-link mdui-ripple" href="https://example.org/categories/%E6%8A%80%E6%9C%AF%E6%96%87%E7%AB%A0/">技术文章</a>
                    <span class="category-list-count">2</span>
                </li>
                
                
                <li class="category-list-item">
                    <a class="category-list-link mdui-ripple" href="https://example.org/categories/%E7%94%9F%E6%B4%BB%E9%9A%8F%E7%AC%94/">生活随笔</a>
                    <span class="category-list-count">1</span>
                </li>
                
            </ul>
        </div>
    </div>
    
</aside>
        <div class="nexmoe-copyright">
            © 2026 <a href="/">示例博客</a><br>
            Powered by <a href="https://gohugo.io" target="_blank">Hugo</a><br>
            Theme <a rel="friend" href="https://github.com/yourname/bolo" target="_blank">bolo</a>
        </div>
    </div>
</div>
    <div id="nexmoe-content">
        <div class="nexmoe-primary">
            <main id="pjax" class="fn__flex-1">
                
<section class="nexmoe-posts" id="brand-waterfall">
    
    
    
    <div class="nexmoe-post">
        <a href="https://example.org/categories/%E6%8A%80%E6%9C%AF%E6%96%87%E7%AB%A0/" title="技术文章">
            <div class="nexmoe-post-cover mdui-ripple">
                
                <img referrerpolicy="origin" src="/images/default-cover.jpg" alt="技术文章" class="lazyload index-img">
                
                <h1>技术文章</h1>
            </div>
        </a>
        <div class="nexmoe-post-meta">
            <span><i class="nexmoefont iconfont solo-calendarl"></i>2024年05月12日</span>
            
            
        </div>
        <article>
            <p class="summary"></p>
        </article>
    </div>
    
    <div class="nexmoe-post">
        <a href="https://example.org/categories/%E7%94%9F%E6%B4%BB%E9%9A%8F%E7%AC%94/" title="生活随笔">
            <div class="nexmoe-post-cover mdui-ripple">
                
                <img referrerpolicy="origin" src="/images/default-cover.jpg" alt="生活随笔" class="lazyload index-img">
                
                <h1>生活随笔</h1>
            </div>
        </a>
        <div class="nexmoe-post-meta">
            <span><i class="nexmoefont iconfont solo-calendarl"></i>2024年05月06日</span>
            
            
        </div>
        <article>
            <p class="summary"></p>
        </article>
    </div>
    
</section>



            </main>
            <div class="nexmoe-hitokoto">
                <p id="hitokoto">生活不止眼前的代码，还有诗和远方。</p>
            </div>
            <div class="back-to-top iconfont solo-gotop" onclick="window.scrollTo({top:0,behavior:'smooth'})"></div>
        </div>
    </div>
    <script src="/js/mdui.min.js"></script>
<script src="/js/canvas.js"></script>
<script src="/js/app.js"></script>
<script src="/js/lazysizes.min.js"></script>
<script src="/js/common.js"></script>
</body>
</html>
