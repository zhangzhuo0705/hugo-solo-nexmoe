{{ define "main" }}
<style>
.links-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 20px;
    padding: 20px 0;
}
.link-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 15px;
    border-radius: 8px;
    background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    transition: transform 0.2s, box-shadow 0.2s;
    text-decoration: none;
    color: inherit;
}
.link-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
}
.link-card img {
    width: 80px;
    height: 80px;
    border-radius: 12px;
    object-fit: cover;
    margin-bottom: 10px;
}
.link-card .link-name {
    font-size: 16px;
    font-weight: 500;
    color: #333;
}
</style>
<article class="links nexmoe-py">
    <h2>友情链接</h2>
    <div class="links-grid">
        {{ range .Site.Params.links }}
        <a class="link-card" href="{{ .url }}" target="_blank" rel="noopener">
            <img src="{{ .avatar | default .logo | default "images/default-avatar.png" | relURL }}" alt="{{ .name }}">
            <span class="link-name">{{ .name }}</span>
        </a>
        {{ end }}
    </div>
</article>
{{ end }}
