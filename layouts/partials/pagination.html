{{ $paginator := .Paginator }}
{{ if gt $paginator.TotalPages 1 }}
<nav class="nexmoe-page-nav">
    {{ if $paginator.HasPrev }}
    <a class="extend prev" rel="prev" href="{{ $paginator.Prev.URL }}">
        <i class="nexmoefont iconfont solo-left"></i>
    </a>
    {{ end }}
    
    {{ range $paginator.Pagers }}
    {{ if eq . $paginator }}
    <span class="page-number current">{{ .PageNumber }}</span>
    {{ else }}
    <a class="page-number" href="{{ .URL }}">{{ .PageNumber }}</a>
    {{ end }}
    {{ end }}
    
    {{ if $paginator.HasNext }}
    <a class="extend next" rel="next" href="{{ $paginator.Next.URL }}">
        <i class="nexmoefont iconfont solo-right"></i>
    </a>
    {{ end }}
</nav>
{{ end }}
