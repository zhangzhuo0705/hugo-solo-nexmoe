<div id="nexmoe-header">
    <div class="nexmoe-drawer mdui-drawer" id="drawer">
        <div class="nexmoe-avatar mdui-ripple">
            <a href="{{ "/" | relURL }}" title="{{ .Site.Title }}">
                <img src="{{ .Site.Params.avatar | default "avatar.png" | relURL }}" title="{{ .Site.Title }}" alt="{{ .Site.Title }}">
            </a>
        </div>
        <div class="nexmoe-count">
            <div>
                <span>文章</span>
                {{ $pages := where .Site.RegularPages ".Params.layout" "!=" "links" }}
                {{ $pages := where $pages ".Params.layout" "!=" "archives" }}
                {{ len $pages }}
            </div>
        </div>
        {{ partial "nav.html" . }}
        {{ partial "widgets.html" . }}
        <div class="nexmoe-copyright">
            © {{ now.Year }} <a href="{{ "/" | relURL }}">{{ .Site.Title }}</a><br>
            Powered by <a href="https://gohugo.io" target="_blank">Hugo</a><br>
            Theme <a rel="friend" href="https://github.com/yourname/bolo" target="_blank">bolo</a>
        </div>
    </div>
</div>
